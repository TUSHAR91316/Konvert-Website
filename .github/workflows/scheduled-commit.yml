name: Scheduled Commit - Update README & Rebuild Docs

on:
  schedule:
    # Runs daily at 10:00 AM UTC (customize time as needed)
    - cron: '0 10 * * *'
  
  # Allow manual trigger if needed
  workflow_dispatch:

jobs:
  scheduled-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      # Step to update README (customize as needed)
      - name: Update README
        run: |
          echo "# Konvert - Advanced File Management & Conversion Tool" > README.md
          echo "" >> README.md
          echo "**Last Updated:** $(date)" >> README.md
          echo "" >> README.md
          echo "## Documentation" >> README.md
          echo "See [SELF_HOSTING_101.md](./SELF_HOSTING_101.md) for self-hosting guide." >> README.md
          echo "" >> README.md
          echo "Visit our [Community Discussions](https://github.com/TUSHAR91316/Konvert-Website/discussions) to share feedback and ideas." >> README.md

      # Step to rebuild docs (customize based on your build process)
      - name: Rebuild Documentation
        run: |
          # Add your docs build command here
          # Example: npm run build:docs
          # Example: python scripts/build_docs.py
          echo "Documentation rebuild completed"

      # Check if there are any changes
      - name: Check for changes
        id: verify-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # Commit and push if there are changes
      - name: Commit and push changes
        if: steps.verify-changes.outputs.has_changes == 'true'
        run: |
          git add README.md
          git add docs/ 2>/dev/null || true
          git commit -m "chore: automated update - README and docs rebuild [ci skip]"
          git push

      # Alternative: Force commit even if no changes
      # Uncomment the section below to always commit (even empty commits)
      # - name: Force Commit
      #   if: always()
      #   run: |
      #     git add README.md
      #     git add docs/ 2>/dev/null || true
      #     git commit --allow-empty -m "chore: automated update - README and docs rebuild [$(date)]"
      #     git push
